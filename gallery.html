<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Brick‑O‑Lage Construction</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="v2-header">
      <div class="v2-logo">
        <img
          src="images/brickolage-logo.jpg"
          alt="Brick‑O‑Lage Construction logo"
        />
        <span>Brick‑O‑Lage Construction</span>
      </div>

      <button
        class="v2-theme-toggle"
        aria-label="Toggle dark mode"
        aria-expanded="false"
      >
        <span class="sun">☀️</span>
        <span class="moon">🌙</span>
      </button>

      <button
        class="v2-nav-toggle"
        aria-label="Open menu"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="v2-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="gallery.html" class="active">Gallery</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="v2-gallery">
        <h1>Project Gallery</h1>

        <div class="v2-gallery-grid">
          <img src="images/construction-structure-1.jpg" alt="Construction" />
          <img src="images/interior-bathroom-1.jpg" alt="Bathroom" />
          <img src="images/interior-kitchen-1.jpg" alt="Kitchen" />
          <img src="images/coastal-view-1.jpg" alt="Coastal view" />
          <img src="images/decorative-blocks-1.jpg" alt="Decorative blocks" />
        </div>
      </section>
    </main>

    <footer class="v2-footer">
      <p>&copy; <span id="year"></span> Brick‑O‑Lage Construction</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
